<!DOCTYPE html>
<html>
<head>
  <title>Create Resume</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, black, #1A0033);
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .card {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #cbd5f5;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: rgba(99,102,241,0.05);
      color: white;
      outline: none;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 1px #6366f1;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4f46e5;
    }

    .improve-btn {
      margin-top: 12px;
      padding: 6px 12px;
      background: linear-gradient(135deg, #0f766e, #0e7490);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 1px;
      letter-spacing: 0.3px;
    }

    .improve-btn:hover {
      background: linear-gradient(135deg, #0e7490, #0f766e);
      transform: translateY(-1px);
    }

    .improve-btn:active {
      transform: translateY(0px);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Build Your Resume 🚀</h1>
<div class="card">
  <h3>🤖 AI Resume Generator</h3>

  <textarea id="aiPrompt" placeholder="
Example:
Name: Priyanka
Role: BCA Student
Skills: Python, Web Development
Projects: Resume Builder
Experience: Internship at XYZ
Goal: Software Developer
"></textarea>

  <button type="button" class="improve-btn" onclick="generateAI()">Generate with AI ⚡</button>
</div>
  <!-- PERSONAL -->
  <div class="card">
  <h3>👤 Personal Info</h3>
  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="text" id="location" placeholder="Location">
  <input type="text" id="linkedin" placeholder="LinkedIn / Portfolio Link">
  <input type="text" id="photo" placeholder="Photo URL (optional)">
</div>
 <div class="card">
    <h3>🧠 Summary</h3>
    <textarea id="summary" placeholder="Write a short professional summary"></textarea>
    <button class="improve-btn" onclick="analyzeSection('summary', 'Summary', this)">✦ Improve this section</button>
    <div id="result_summary"></div>
  </div>

  <!-- PROJECTS -->
  <div class="card">
    <h3>🚀 Projects</h3>
    <textarea id="projects" placeholder="Describe your projects"></textarea>
    <button class="improve-btn" onclick="analyzeSection('projects', 'Projects', this)">✦ Improve this section</button>
    <div id="result_projects"></div>
  </div>

  <!-- ACHIEVEMENTS -->
  <div class="card">
    <h3>🏆 Achievements / Certifications</h3>
    <textarea id="achievements" placeholder="Awards, certifications, etc."></textarea>
    <button class="improve-btn" onclick="analyzeSection('achievements', 'Achievements', this)">✦ Improve this section</button>
    <div id="result_achievements"></div>
  </div>

  <!-- SKILLS -->
  <div class="card">
    <h3>⚡ Skills</h3>
    <textarea id="skills" placeholder="e.g. Java, Python, UI Design"></textarea>
    <button class="improve-btn" onclick="analyzeSection('skills', 'Skills', this)">✦ Improve this section</button>
    <div id="result_skills"></div>
  </div>

  <!-- EDUCATION -->
  <div class="card">
    <h3>🎓 Education</h3>
    <textarea id="education" placeholder="Your education details"></textarea>
    <button class="improve-btn" onclick="analyzeSection('education', 'Education', this)">✦ Improve this section</button>
    <div id="result_education"></div>
  </div>

  <!-- EXPERIENCE -->
  <div class="card">
    <h3>💼 Experience</h3>
    <textarea id="experience" placeholder="Your work or internship experience"></textarea>
    <button class="improve-btn" onclick="analyzeSection('experience', 'Experience', this)">✦ Improve this section</button>
    <div id="result_experience"></div>
  </div>

  <button class="btn" onclick="saveResume()">Preview Resume →</button>
</div>


  <!-- <div style="display: flex; gap: 10px; margin-top: 10px;">
  <button class="btn" onclick="analyzeResume()" style="background: #0f766e;">Analyze with AI ✦</button>
  <button class="btn" onclick="saveResume()">Preview Resume →</button>
</div> -->
<div id="analysisResults" style="margin-top: 20px;"></div>



<script>
function saveResume() {
  const resume = {
  name: document.getElementById("name").value,
  email: document.getElementById("email").value,
  phone: document.getElementById("phone").value,
  location: document.getElementById("location").value,
  linkedin: document.getElementById("linkedin").value,
  photo: document.getElementById("photo").value,
  summary: document.getElementById("summary").value,
  skills: document.getElementById("skills").value,
  education: document.getElementById("education").value,
  experience: document.getElementById("experience").value,
  projects: document.getElementById("projects").value,
  achievements: document.getElementById("achievements").value
};

  localStorage.setItem("resume", JSON.stringify(resume));

  window.location.href = "templates.html";
}
</script>
<script>
const data = JSON.parse(localStorage.getItem("resume"));

if (data) {
  document.getElementById("name").value = data.name || "";
  document.getElementById("email").value = data.email || "";
  document.getElementById("skills").value = data.skills || "";
  document.getElementById("education").value = data.education || "";
  document.getElementById("experience").value = data.experience || "";
}
</script>
<script>
async function generateAI() {

  const prompt = document.getElementById("aiPrompt").value;

  if (!prompt) {
    alert("Please enter details!");
    return;
  }

  try {

    const response = await fetch("http://localhost:5435/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();

    console.log(data);

    if (data.error) {
      console.error(data.error);
  alert(data.error.message || JSON.stringify(data.error));
  return;;
    }

    // Gemini response
    const aiText = data.text;

    const result = JSON.parse(aiText);

    document.getElementById("name").value = result.name || "";
    document.getElementById("summary").value = result.summary || "";
    document.getElementById("skills").value = result.skills || "";
    document.getElementById("projects").value = result.projects || "";
    document.getElementById("experience").value = result.experience || "";

    alert("AI Resume Generated 🚀");

  } catch (error) {
    alert("Backend Error: " + error.message);
  }
}
</script>

<script>
async function analyzeSection(fieldId, sectionName, btn) {
  const text = document.getElementById(fieldId).value.trim();

  if (!text) {
    alert("Please write something in " + sectionName + " first");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Improving...";

  const resultDiv = document.getElementById("result_" + fieldId);
  resultDiv.innerHTML = "<p style='color:#94a3b8; margin-top:12px; font-size:13px;'>Analyzing your text...</p>";

  try {
    const response = await fetch("http://localhost:5435/analyze-section", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sectionName, sectionText: text })
    });

    const data = await response.json();

    if (data.error) {
      resultDiv.innerHTML = "<p style='color:#f87171; margin-top:10px; font-size:13px;'>Failed. Try again.</p>";
      btn.disabled = false;
      btn.innerText = "✦ Improve this section";
      return;
    }

    resultDiv.innerHTML = `
      <div style="margin-top:14px;">
        <p style="font-size:12px; color:#94a3b8; margin-bottom:6px;">AI suggested version</p>
        <div style="background:#0f2027; padding:12px; border-radius:8px; font-size:14px; color:#a7f3d0; line-height:1.6;" id="ai_${fieldId}">${data.rewritten}</div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button onclick="useAI('${fieldId}')" style="flex:1; padding:9px; background:#0f766e; border:none; border-radius:8px; color:white; font-size:13px; cursor:pointer;">Use this ✓</button>
          <button onclick="keepMine('${fieldId}')" style="flex:1; padding:9px; background:#1e293b; border:1px solid #334155; border-radius:8px; color:white; font-size:13px; cursor:pointer;">Keep mine</button>
        </div>
      </div>`;

  } catch (e) {
    resultDiv.innerHTML = "<p style='color:#f87171; margin-top:10px; font-size:13px;'>Server error. Is backend running?</p>";
  }

  btn.disabled = false;
  btn.innerText = "✦ Improve this section";
}

function useAI(fieldId) {
  document.getElementById(fieldId).value = document.getElementById("ai_" + fieldId).innerText;
  document.getElementById("result_" + fieldId).innerHTML = "<p style='color:#a7f3d0; margin-top:8px; font-size:13px;'>✓ Updated with AI version</p>";
}

function keepMine(fieldId) {
  document.getElementById("result_" + fieldId).innerHTML = "<p style='color:#94a3b8; margin-top:8px; font-size:13px;'>Kept your original version</p>";
}
</script>
</body>
</html>
