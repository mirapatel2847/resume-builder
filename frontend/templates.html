<!DOCTYPE html>
<html>
<head>
  <title>Select Template</title>

  <style>
    body {
      background: linear-gradient(to bottom, black, #1A0033);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .templates {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .template {
      width: 250px;
      height: 300px;
      background: #020617;
      border: 2px solid #334155;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      padding: 10px;
    }

    .template:hover {
      border-color: #6366f1;
      transform: scale(1.05);
    }

    .template h3 {
      margin-top: 120px;
    }
  </style>
</head>

<body>

<h1>Choose Your Template 🎨</h1>
<br><br><br><br>

<div class="templates">
    <div class="template" onclick="selectTemplate('classic')">
  <h3>Classic ATS</h3>
</div>

<div class="template" onclick="selectTemplate('professional')">
  <h3>Professional ATS</h3>
</div>

<div class="template" onclick="selectTemplate('modern')">
  <h3>Modern (Photo)</h3>
</div>

<div class="template" onclick="selectTemplate('creative')">
  <h3>Creative (Photo)</h3>
</div>
</div>

<script>
function selectTemplate(template) {
  localStorage.setItem("template", template);
  window.location.href = "preview.html";
}
</script>

</body>
</html>
