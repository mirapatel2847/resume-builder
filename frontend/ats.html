<!DOCTYPE html>
<html>
<head>
<title>ATS Checker</title>
<style>
body{
background:linear-gradient(to bottom,black,#1A0033);
font-family:Poppins,sans-serif;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#020617;
padding:25px;
border-radius:12px;
border:1px solid #334155;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
padding:12px;
margin-top:10px;
background:#0f172a;
border:1px solid #334155;
color:white;
border-radius:8px;
resize:none;
margin-right:40px;
}

button{
width:100%;
padding:14px;
background:#6366f1;
border:none;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#4f46e5;
}

.result{
white-space:pre-line;
line-height:1.8;
}
</style>
</head>

<body>

<div class="container">

<h1>ATS Resume Checker</h1>

<div class="card">
<h3>Paste Resume</h3>
<textarea id="resume"></textarea>
</div>

<div class="card">
<h3>Paste Job Description</h3>
<textarea id="job"></textarea>

<button onclick="checkATS()">Check ATS Score 🚀</button>
</div>

<div class="card">
<h3>Result</h3>
<div class="result" id="result"></div>
</div>

</div>

<script>
async function checkATS() {
  const resume = document.getElementById("resume").value;
  const job = document.getElementById("job").value;

  const resultBox = document.getElementById("result");
  resultBox.innerHTML = "Checking...";

  try {
    const response = await fetch("http://localhost:5435/ats", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ resume, job })
    });

    const data = await response.json();

    resultBox.innerHTML = data.result;

  } catch (error) {
    console.error(error);
    resultBox.innerHTML = "Backend connection failed";
  }
}
</script>

</body>
</html>
